<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(99,102,241);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(168,85,247);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(59,130,246);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(147,51,234);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circles -->
  <circle cx="300" cy="300" r="250" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="300" cy="300" r="200" fill="url(#grad2)" opacity="0.1"/>
  
  <!-- Dashboard card -->
  <rect x="150" y="150" width="300" height="200" rx="20" fill="url(#grad1)" opacity="0.8"/>
  
  <!-- Chart bars -->
  <rect x="180" y="250" width="40" height="80" rx="5" fill="white" opacity="0.9"/>
  <rect x="240" y="220" width="40" height="110" rx="5" fill="white" opacity="0.9"/>
  <rect x="300" y="200" width="40" height="130" rx="5" fill="white" opacity="0.9"/>
  <rect x="360" y="230" width="40" height="100" rx="5" fill="white" opacity="0.9"/>
  
  <!-- Heatmap representation -->
  <circle cx="450" cy="200" r="30" fill="#ef4444" opacity="0.6"/>
  <circle cx="480" cy="250" r="25" fill="#f97316" opacity="0.6"/>
  <circle cx="420" cy="280" r="20" fill="#eab308" opacity="0.6"/>
  
  <!-- Analytics line -->
  <path d="M 100 400 Q 200 350, 300 380 T 500 350" stroke="url(#grad2)" stroke-width="4" fill="none" opacity="0.7"/>
  
  <!-- Data points -->
  <circle cx="100" cy="400" r="8" fill="url(#grad1)"/>
  <circle cx="200" cy="350" r="8" fill="url(#grad1)"/>
  <circle cx="300" cy="380" r="8" fill="url(#grad1)"/>
  <circle cx="400" cy="350" r="8" fill="url(#grad1)"/>
  <circle cx="500" cy="350" r="8" fill="url(#grad1)"/>
</svg>
